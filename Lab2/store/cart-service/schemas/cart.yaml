components:
  schemas:
    AddToCartRequest:
      type: object
      additionalProperties: false
      properties:
        item_id:
          type: integer
        quantity:
          type: integer
      required:
        - item_id
        - quantity

    CartItem:
      type: object
      additionalProperties: false
      properties:
        item_id:
          type: integer
        quantity:
          type: integer

    Cart:
      type: object
      additionalProperties: false
      properties:
        user_id:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'