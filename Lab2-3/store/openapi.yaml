openapi: "3.0.0"
info:
  title: Store API
  version: "1.0.0"
  description: REST API

servers:
  - url: http://localhost:8080
    description: API Gateway

paths:
  /users/register:
    post:
      summary: Регистрация пользователя
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, name, role]
              properties:
                username:
                  type: string
                password:
                  type: string
                name:
                  type: string
                role:
                  type: string
                  enum: [client, seller]
            example:
              username: pavel
              password: "123"
              name: Pavel
              role: client
      responses:
        "201":
          description: Пользователь создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  username:
                    type: string
        "400":
          description: Username уже занят

  /users/login:
    post:
      summary: Логин
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
            example:
              username: pavel
              password: "123"
      responses:
        "200":
          description: Успешный логин
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        "401":
          description: Неверный логин или пароль

  /users/{id}:
    get:
      summary: Получить пользователя по ID
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Пользователь найден
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  username:
                    type: string
                  name:
                    type: string
                  role:
                    type: string
        "401":
          description: Не авторизован
        "404":
          description: Пользователь не найден

  /items:
    get:
      summary: Получить список товаров
      tags: [Items]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список товаров
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
    post:
      summary: Создать товар (только seller)
      tags: [Items]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        "201":
          description: Товар создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        "401":
          description: Не авторизован
        "403":
          description: Недостаточно прав (нужна роль seller)

  /items/{id}:
    get:
      summary: Получить товар по ID
      tags: [Items]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Товар найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        "404":
          description: Товар не найден
    put:
      summary: Обновить товар (только seller)
      tags: [Items]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequest'
      responses:
        "200":
          description: Товар обновлён
        "401":
          description: Не авторизован
        "403":
          description: Недостаточно прав
        "404":
          description: Товар не найден
    delete:
      summary: Удалить товар (только seller)
      tags: [Items]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Товар удалён
        "401":
          description: Не авторизован
        "403":
          description: Недостаточно прав
        "404":
          description: Товар не найден

  /cart:
    get:
      summary: Получить корзину пользователя
      tags: [Cart]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Корзина пользователя
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CartItem'
        "401":
          description: Не авторизован
    post:
      summary: Добавить товар в корзину
      tags: [Cart]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [item_id, quantity]
              properties:
                item_id:
                  type: integer
                quantity:
                  type: integer
      responses:
        "200":
          description: Товар добавлен
        "401":
          description: Не авторизован

  /cart/{item_id}:
    delete:
      summary: Удалить товар из корзины
      tags: [Cart]
      security:
        - bearerAuth: []
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Товар удалён из корзины
        "401":
          description: Не авторизован
        "404":
          description: Товар не найден в корзине

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    Item:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        quantity:
          type: integer

    CreateItemRequest:
      type: object
      required: [name, price, quantity]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        quantity:
          type: integer

    UpdateItemRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        quantity:
          type: integer

    CartItem:
      type: object
      properties:
        item_id:
          type: integer
        quantity:
          type: integer