components:
  schemas:
    CreateItemRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        quantity:
          type: integer
      required:
        - name
        - price
        - quantity

    UpdateItemRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        quantity:
          type: integer